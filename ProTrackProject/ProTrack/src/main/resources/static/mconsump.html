<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Record Material Consumption</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eef2f7; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .form-container { background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 400px; }
        h2 { text-align: center; margin-bottom: 20px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        select, input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; }
        button { margin-top: 20px; width: 100%; padding: 12px; background: #4a90e2; border: none; color: #fff; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: #357ab8; }
    </style>
</head>
<body>
<div class="form-container">
    <h2>Record Material Consumption</h2>
    <form id="consumptionForm">
        <label for="rawMaterial">Raw Material</label>
        <select id="rawMaterial" required></select>

        <label for="batch">Production Batch</label>
        <select id="batch" required></select>

        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" required>

        <label for="dateConsumed">Date Consumed</label>
        <input type="date" id="dateConsumed" required>

        <button type="submit">Save</button>
    </form>
</div>

<script>
    const apiUrl = "http://localhost:1010/api/v1/material-consumptions";
   const materialUrl = "http://localhost:1010/api/v1/raw-materials";
   const batchUrl = "http://localhost:1010/api/v1/batches"; // <-- corrected


       async function loadDropdowns() {
         const materialRes = await fetch(materialUrl);
         const materials = await materialRes.json();
         const materialSelect = document.getElementById("rawMaterial");
         materials.forEach(m => {
           const opt = document.createElement("option");
           opt.value = m.id;
           opt.textContent = m.name;
           materialSelect.appendChild(opt);
         });

         const batchRes = await fetch(batchUrl);
         const batches = await batchRes.json();
         const batchSelect = document.getElementById("batch");
         batches.forEach(b => {
           const opt = document.createElement("option");
           opt.value = b.id;
           opt.textContent = b.batchNumber;
           batchSelect.appendChild(opt);
         });
       }

       document.getElementById("consumptionForm").addEventListener("submit", async (e) => {
         e.preventDefault();
         const newConsumption = {
           rawMaterial: { id: document.getElementById("rawMaterial").value },
           productionBatch: { id: document.getElementById("batch").value },
           quantity: document.getElementById("quantity").value,
           dateConsumed: document.getElementById("dateConsumed").value
         };

         const res = await fetch(apiUrl, {
           method: "POST",
           headers: { "Content-Type": "application/json" },
           body: JSON.stringify(newConsumption)
         });

         if (res.ok) {
           alert("Consumption recorded!");
           e.target.reset();
         } else {
           alert("Error saving record");
         }
       });

       loadDropdowns();
</script>
</body>
</html>
