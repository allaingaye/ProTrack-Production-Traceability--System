<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ProTrack – Secure Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #1d3557;
      --primary-dark: #14213d;
      --secondary: #f1faee;
      --dark: #212529;
      --light: #ffffff;
      --gray: #6c757d;
      --success: #2a9d8f;
      --error: #e63946;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      background: linear-gradient(135deg, rgba(29,53,87,0.95), rgba(20,33,61,0.95)),
      url('https://images.unsplash.com/photo-1581092919531-1c7cda67f07e');
      background-size: cover;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: var(--light);
      border-radius: 16px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
      overflow: hidden;
      position: relative;
    }

    .card-header {
      background: var(--primary);
      color: var(--light);
      text-align: center;
      padding: 24px;
    }

    .logo {
      width: 70px;
      margin-bottom: 12px;
    }

    .card-body { padding: 30px; }

    .form-group { margin-bottom: 18px; }

    label {
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 6px;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      background: var(--primary);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      transition: background 0.3s;
    }

    .btn:hover { background: var(--primary-dark); }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    .text-center { text-align: center; }
    .text-muted { color: var(--gray); font-size: 0.85rem; }

    .alert {
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 0.85rem;
    }

    .alert-success { background: #d8f3dc; color: var(--success); }
    .alert-error { background: #ffe5e5; color: var(--error); }

    .hidden { display: none; }

    /* OTP */
    .otp-container {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .otp-input {
      width: 45px;
      height: 55px;
      text-align: center;
      font-size: 1.4rem;
      border-radius: 8px;
      border: 2px solid #ddd;
    }

    .otp-input:focus {
      border-color: var(--primary);
      outline: none;
    }

    .back-btn {
      position: absolute;
      top: 12px;
      left: 15px;
      background: none;
      border: none;
      font-size: 1.2rem;
      color: white;
      cursor: pointer;
      padding: 5px;
    }

    .mt-3 { margin-top: 15px; }
    a { color: var(--primary); text-decoration: none; cursor: pointer; }
    a:hover { text-decoration: underline; }
  </style>
</head>

<body>

<!-- LOGIN / SIGNUP CARD -->
<div class="card" id="main-card">
  <div class="card-header">
    <img src="https://cdn-icons-png.flaticon.com/512/891/891462.png" class="logo">
    <h2>ProTrack System</h2>
  </div>

  <div class="card-body">

    <!-- LOGIN -->
    <div id="login-form">
      <div id="login-error" class="alert alert-error hidden"></div>

      <div class="form-group">
        <label>Email</label>
        <input id="login-email" type="email" placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input id="login-password" type="password" placeholder="Enter your password">
      </div>

      <button class="btn" id="login-btn">Login</button>

      <div class="text-center mt-3">
        <span class="text-muted">No account?</span>
        <a href="#" id="show-signup">Sign up</a>
      </div>
    </div>

    <!-- SIGNUP -->
    <div id="signup-form" class="hidden">
      <div id="signup-error" class="alert alert-error hidden"></div>
      <div id="signup-success" class="alert alert-success hidden"></div>

      <div class="form-group">
        <label>First Name</label>
        <input id="signup-firstname" placeholder="Enter first name">
      </div>

      <div class="form-group">
        <label>Last Name</label>
        <input id="signup-lastname" placeholder="Enter last name">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input id="signup-email" type="email" placeholder="Enter email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input id="signup-password" type="password" placeholder="Enter password">
      </div>

      <div class="form-group">
        <label>Role</label>
        <select id="signup-role">
          <option value="OPERATOR">Operator</option>
          <option value="QC">Quality Control</option>
          <option value="ADMIN">Admin</option>
        </select>
      </div>

      <button class="btn" id="signup-btn">Create Account</button>

      <div class="text-center mt-3">
        <a href="#" id="show-login">Back to login</a>
      </div>
    </div>
  </div>
</div>

<!-- OTP CARD -->
<div class="card hidden" id="otp-card">
  <button class="back-btn" id="otp-back">←</button>

  <div class="card-header">
    <img src="https://cdn-icons-png.flaticon.com/512/891/891462.png" class="logo">
    <h2>OTP Verification</h2>
  </div>

  <div class="card-body">
    <div id="otp-error" class="alert alert-error hidden"></div>
    <p class="text-muted text-center" style="margin-bottom: 20px;">
      Enter the 6-digit OTP sent to your email
    </p>

    <div class="otp-container">
      <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
    </div>

    <button class="btn" id="verify-otp">Verify OTP</button>
  </div>
</div>

<script>
  // API Configuration
  const API_BASE = "http://localhost:1010/api/v1/users";

  // DOM Elements
  const loginForm = document.getElementById("login-form");
  const signupForm = document.getElementById("signup-form");
  const mainCard = document.getElementById("main-card");
  const otpCard = document.getElementById("otp-card");
  const loginEmail = document.getElementById("login-email");
  const loginPassword = document.getElementById("login-password");
  const loginBtn = document.getElementById("login-btn");
  const signupBtn = document.getElementById("signup-btn");
  const verifyOtpBtn = document.getElementById("verify-otp");
  const otpBackBtn = document.getElementById("otp-back");
  const otpInputs = document.querySelectorAll('.otp-input');

  // Form Toggle
  document.getElementById("show-signup").addEventListener("click", (e) => {
    e.preventDefault();
    loginForm.classList.add("hidden");
    signupForm.classList.remove("hidden");
    clearErrors();
  });

  document.getElementById("show-login").addEventListener("click", (e) => {
    e.preventDefault();
    signupForm.classList.add("hidden");
    loginForm.classList.remove("hidden");
    clearErrors();
  });

  // OTP Back Button
  otpBackBtn.addEventListener("click", () => {
    otpCard.classList.add("hidden");
    mainCard.classList.remove("hidden");
    clearOTPInputs();
    clearErrors();
  });

  // OTP Input Auto-focus
  otpInputs.forEach((input, index) => {
    input.addEventListener('input', (e) => {
      // Auto-focus next input
      if (e.target.value.length === 1 && index < otpInputs.length - 1) {
        otpInputs[index + 1].focus();
      }
    });

    input.addEventListener('keydown', (e) => {
      // Handle backspace
      if (e.key === 'Backspace' && input.value === '' && index > 0) {
        otpInputs[index - 1].focus();
      }
    });
  });

  // SIGNUP Function
  signupBtn.addEventListener("click", async () => {
    const firstName = document.getElementById("signup-firstname").value;
    const lastName = document.getElementById("signup-lastname").value;
    const email = document.getElementById("signup-email").value;
    const password = document.getElementById("signup-password").value;
    const role = document.getElementById("signup-role").value;

    // Basic validation
    if (!firstName || !lastName || !email || !password) {
      return showError("signup-error", "Please fill all required fields");
    }

    if (!validateEmail(email)) {
      return showError("signup-error", "Please enter a valid email");
    }

    try {
      signupBtn.disabled = true;
      signupBtn.textContent = "Creating...";

      const res = await fetch(`${API_BASE}/signup`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json"
        },
        body: JSON.stringify({
          firstName,
          lastName,
          email,
          password,
          role
        })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.message || "Signup failed");
      }

      // Show success message
      const successEl = document.getElementById("signup-success");
      successEl.textContent = "Account created successfully! Please login.";
      successEl.classList.remove("hidden");

      // Clear form
      document.getElementById("signup-firstname").value = "";
      document.getElementById("signup-lastname").value = "";
      document.getElementById("signup-email").value = "";
      document.getElementById("signup-password").value = "";

      // Switch to login after 2 seconds
      setTimeout(() => {
        signupForm.classList.add("hidden");
        loginForm.classList.remove("hidden");
        successEl.classList.add("hidden");
      }, 2000);

    } catch (error) {
      showError("signup-error", error.message || "Signup failed. Please try again.");
    } finally {
      signupBtn.disabled = false;
      signupBtn.textContent = "Create Account";
    }
  });

  // LOGIN Function
  loginBtn.addEventListener("click", async () => {
    const email = loginEmail.value;
    const password = loginPassword.value;

    if (!email || !password) {
      return showError("login-error", "Please enter email and password");
    }

    if (!validateEmail(email)) {
      return showError("login-error", "Please enter a valid email");
    }

    try {
      loginBtn.disabled = true;
      loginBtn.textContent = "Logging in...";

      const res = await fetch(`${API_BASE}/login`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json"
        },
        body: JSON.stringify({ email, password })
      });

      if (!res.ok) {
        const errorData = await res.json().catch(() => ({}));
        throw new Error(errorData.message || "Invalid credentials");
      }

      const user = await res.json();

      // Check if user requires OTP
      if (user.role === "ADMIN" || user.role === "QC") {
        // Send OTP
        const otpRes = await fetch(`${API_BASE}/send-otp`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        if (!otpRes.ok) {
          throw new Error("Failed to send OTP");
        }

        // Store user data and show OTP screen
        localStorage.setItem("pendingUser", JSON.stringify(user));
        localStorage.setItem("pendingEmail", email);
        mainCard.classList.add("hidden");
        otpCard.classList.remove("hidden");
      } else {
        // Direct redirect for OPERATOR
        redirect(user);
      }

    } catch (error) {
      showError("login-error", error.message);
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = "Login";
    }
  });

  // OTP Verification
  verifyOtpBtn.addEventListener("click", async () => {
    const otp = Array.from(otpInputs).map(input => input.value).join("");
    const email = localStorage.getItem("pendingEmail");

    if (otp.length !== 6) {
      return showError("otp-error", "Please enter the complete 6-digit OTP");
    }

    try {
      verifyOtpBtn.disabled = true;
      verifyOtpBtn.textContent = "Verifying...";

      const res = await fetch(`${API_BASE}/verify-otp`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, otp })
      });

      if (!res.ok) {
        const errorData = await res.json();
        throw new Error(errorData.message || "Invalid OTP");
      }

      const result = await res.json();
      const user = JSON.parse(localStorage.getItem("pendingUser"));

      // Clear temporary storage
      localStorage.removeItem("pendingUser");
      localStorage.removeItem("pendingEmail");

      // Redirect user
      redirect(user);

    } catch (error) {
      showError("otp-error", error.message);
      clearOTPInputs();
    } finally {
      verifyOtpBtn.disabled = false;
      verifyOtpBtn.textContent = "Verify OTP";
    }
  });

  // Helper Functions
  function redirect(user) {
    localStorage.setItem("currentUser", JSON.stringify(user));

    switch(user.role) {
      case "ADMIN":
        window.location.href = "admin.html";
        break;
      case "QC":
        window.location.href = "qc.html";
        break;
      case "OPERATOR":
        window.location.href = "operator.html";
        break;
      default:
        showError("login-error", "Unknown user role");
    }
  }

  function showError(elementId, message) {
    const element = document.getElementById(elementId);
    element.textContent = message;
    element.classList.remove("hidden");

    // Auto-hide error after 5 seconds
    setTimeout(() => {
      element.classList.add("hidden");
    }, 5000);
  }

  function clearErrors() {
    document.querySelectorAll('.alert').forEach(alert => {
      alert.classList.add("hidden");
    });
  }

  function clearOTPInputs() {
    otpInputs.forEach(input => {
      input.value = "";
    });
    otpInputs[0].focus();
  }

  function validateEmail(email) {
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return re.test(email);
  }

  // Allow form submission with Enter key
  document.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      if (!signupForm.classList.contains('hidden')) {
        signupBtn.click();
      } else if (!loginForm.classList.contains('hidden')) {
        loginBtn.click();
      } else if (!otpCard.classList.contains('hidden')) {
        verifyOtpBtn.click();
      }
    }
  });
</script>
</body>
</html>
